<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      display: flex;
      flex-direction: column; /* Stack elements vertically */
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f0f0f0;
      font-family: sans-serif;
      gap: 20px;
    }

    .upload-btn {
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
    }

    #preview {
      max-width: 80%;
      max-height: 400px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: none; /* Hidden until an image is loaded */
    }
  </style>
</head>
<body>

  <!-- Image Preview Container -->
  <img id="preview" src="" alt="Image preview">

  <!-- Hidden file input -->
  <input type="file" id="fileInput" accept="image/*" style="display: none;">

  <!-- Visible button -->
  <button class="upload-btn" onclick="document.getElementById('fileInput').click();">
    Upload Image
  </button>

  <script>
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');

    fileInput.addEventListener('change', function() {
      const file = this.files[0]; // Get the selected file

      if (file) {
        const reader = new FileReader();

        // This runs once the file is finished being "read"
        reader.onload = function(e) {
          preview.src = e.target.result; // Set the image source to the file data
          preview.style.display = 'block'; // Make the image visible
        }

        reader.readAsDataURL(file); // Convert the image to a format the browser can display
      }
    });
  </script>

</body>
</html>
