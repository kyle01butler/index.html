<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facecheck</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #f5f3ee; --ink: #111; --muted: #888; --accent: #c8f03c; --green: #00ff88; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .noise {
      pointer-events: none;
      position: fixed;
      inset: 0;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px;
    }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .logo { font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; }
    .tagline { font-size: 11px; letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; }

    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      text-align: center;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(3.5rem, 10vw, 7rem);
      line-height: 0.95;
      letter-spacing: -0.02em;
    }

    h1 em { font-style: italic; color: var(--muted); }
    .sub { font-size: 12px; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; }

    .camera-btn {
      position: relative;
      width: 96px; height: 96px;
      border-radius: 50%;
      border: 1.5px solid var(--ink);
      background: transparent;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .camera-btn:hover { background: var(--accent); border-color: var(--accent); transform: scale(1.05); }
    .camera-btn:hover svg { stroke: var(--ink); }
    .camera-btn:active { transform: scale(0.97); }
    .camera-btn svg { width: 36px; height: 36px; stroke: var(--ink); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.2s; }

    .pulse-ring {
      position: absolute; inset: -10px;
      border-radius: 50%;
      border: 1px solid var(--ink);
      opacity: 0;
      animation: pulse 2.4s ease-out infinite;
    }
    @keyframes pulse { 0% { opacity: 0.5; transform: scale(1); } 100% { opacity: 0; transform: scale(1.3); } }

    .btn-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-top: 0.5rem; }

    .video-wrapper { display: none; flex-direction: column; align-items: center; gap: 1.2rem; }
    .video-wrapper.active { display: flex; }

    .video-container {
      position: relative;
      width: min(420px, 90vw);
      border-radius: 4px;
      border: 1.5px solid var(--ink);
      overflow: hidden;
      background: #000;
    }

    video {
      display: block;
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      transform: scaleX(-1);
      pointer-events: none;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .status-dot.loading { background: #f0a500; animation: blink 1s ease-in-out infinite; }
    .status-dot.detected { background: var(--green); }
    .status-dot.scanning { background: var(--muted); }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .close-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      background: none; border: none;
      cursor: pointer; padding: 0.3rem 0;
      transition: color 0.15s;
    }
    .close-btn:hover { color: var(--ink); }

    .error-msg { font-size: 12px; color: #c0392b; letter-spacing: 0.05em; display: none; }

    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 1.5rem 2rem;
      display: flex; justify-content: center;
    }
    .footer-text { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  </style>
</head>
<body>
  <div class="noise"></div>

  <header>
    <span class="logo">Facecheck</span>
    <span class="tagline">AI Face Rating</span>
  </header>

  <main class="center" id="main">
    <h1>Rate<br /><em>your</em><br />face.</h1>
    <p class="sub">Point. Shoot. Judge.</p>
    <div style="display:flex;flex-direction:column;align-items:center;gap:0.5rem;">
      <button class="camera-btn" id="openCameraBtn" aria-label="Open camera">
        <div class="pulse-ring"></div>
        <svg viewBox="0 0 24 24">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </button>
      <span class="btn-label">Open camera</span>
    </div>
    <p class="error-msg" id="errorMsg">Camera access denied. Please allow camera permissions.</p>
  </main>

  <div class="video-wrapper" id="videoWrapper">
    <div class="video-container">
      <video id="videoFeed" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
    </div>
    <div class="status-bar">
      <div class="status-dot loading" id="statusDot"></div>
      <span id="statusText">Loading model…</span>
    </div>
    <button class="close-btn" id="closeCameraBtn">✕ close camera</button>
  </div>

  <footer>
    <span class="footer-text">Your video never leaves your device</span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <script>
    const openBtn = document.getElementById('openCameraBtn');
    const closeBtn = document.getElementById('closeCameraBtn');
    const main = document.getElementById('main');
    const videoWrapper = document.getElementById('videoWrapper');
    const video = document.getElementById('videoFeed');
    const canvas = document.getElementById('overlay');
    const ctx = canvas.getContext('2d');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const errorMsg = document.getElementById('errorMsg');

    let stream = null;
    let animFrameId = null;
    let faceMesh = null;
    let modelReady = false;

    // Key landmark indices — eyes, brows, nose, mouth, jaw
    const KEY_POINTS = new Set([
      1, 4, 5, 6, 195, 197,           // nose
      33, 133, 159, 145, 160, 144,     // left eye
      362, 263, 386, 374, 387, 373,    // right eye
      46, 55, 65, 107, 66, 105,        // left brow
      276, 285, 295, 336, 296, 334,    // right brow
      61, 291, 0, 17, 13, 14, 78, 308, // mouth
      152, 234, 454, 10, 127, 356,     // jaw & chin
      116, 345, 187, 411               // cheeks
    ]);

    function setStatus(state, text) {
      statusDot.className = 'status-dot ' + state;
      statusText.textContent = text;
    }

    function drawLandmarks(landmarks) {
      const W = canvas.width;
      const H = canvas.height;

      // All dots
      landmarks.forEach((lm, i) => {
        const x = lm.x * W;
        const y = lm.y * H;
        const isKey = KEY_POINTS.has(i);
        ctx.beginPath();
        ctx.arc(x, y, isKey ? 3.5 : 1.8, 0, 2 * Math.PI);
        ctx.fillStyle = isKey ? '#00ff88' : 'rgba(0,255,136,0.6)';
        ctx.fill();
      });

      // Soft glow on key points
      ctx.save();
      KEY_POINTS.forEach(i => {
        if (i >= landmarks.length) return;
        const x = landmarks[i].x * W;
        const y = landmarks[i].y * H;
        ctx.beginPath();
        ctx.arc(x, y, 8, 0, 2 * Math.PI);
        ctx.fillStyle = 'rgba(0,255,136,0.07)';
        ctx.fill();
      });
      ctx.restore();
    }

    function initFaceMesh() {
      faceMesh = new FaceMesh({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
      });

      faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: false,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
      });

      faceMesh.onResults((results) => {
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
          setStatus('detected', 'Face detected');
          drawLandmarks(results.multiFaceLandmarks[0]);
        } else {
          if (modelReady) setStatus('scanning', 'Scanning…');
        }
      });

      faceMesh.initialize().then(() => {
        modelReady = true;
        setStatus('scanning', 'Scanning…');
        processFrames();
      });
    }

    async function processFrames() {
      if (!stream || !modelReady) return;
      if (video.readyState >= 2) {
        await faceMesh.send({ image: video });
      }
      animFrameId = requestAnimationFrame(processFrames);
    }

    openBtn.addEventListener('click', async () => {
      errorMsg.style.display = 'none';
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: 640, height: 480 },
          audio: false
        });
        video.srcObject = stream;
        main.style.display = 'none';
        videoWrapper.classList.add('active');
        setStatus('loading', 'Loading model…');

        if (!faceMesh) {
          initFaceMesh();
        } else if (modelReady) {
          setStatus('scanning', 'Scanning…');
          processFrames();
        }
      } catch (err) {
        errorMsg.style.display = 'block';
      }
    });

    closeBtn.addEventListener('click', () => {
      if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      video.srcObject = null;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      videoWrapper.classList.remove('active');
      main.style.display = 'flex';
    });
  </script>
</body>
</html>
