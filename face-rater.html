<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facecheck</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ee;
      --ink: #111;
      --muted: #888;
      --accent: #c8f03c;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      overflow: hidden;
    }

    .noise {
      pointer-events: none;
      position: fixed;
      inset: 0;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px;
    }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .logo {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink);
    }

    .tagline {
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      text-align: center;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(3.5rem, 10vw, 7rem);
      line-height: 0.95;
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    h1 em {
      font-style: italic;
      color: var(--muted);
    }

    .sub {
      font-size: 12px;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .camera-btn {
      position: relative;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 1.5px solid var(--ink);
      background: transparent;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .camera-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      transform: scale(1.05);
    }

    .camera-btn:hover svg { stroke: var(--ink); }

    .camera-btn:active { transform: scale(0.97); }

    .camera-btn svg {
      width: 36px;
      height: 36px;
      stroke: var(--ink);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.2s;
    }

    .pulse-ring {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px solid var(--ink);
      opacity: 0;
      animation: pulse 2.4s ease-out infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.5; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.3); }
    }

    .btn-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.5rem;
    }

    .video-wrapper {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .video-wrapper.active { display: flex; }

    video {
      width: min(420px, 90vw);
      aspect-ratio: 4/3;
      object-fit: cover;
      border-radius: 4px;
      border: 1.5px solid var(--ink);
      transform: scaleX(-1);
    }

    .close-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.5rem 0;
      transition: color 0.15s;
    }

    .close-btn:hover { color: var(--ink); }

    .error-msg {
      font-size: 12px;
      color: #c0392b;
      letter-spacing: 0.05em;
      display: none;
    }

    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: center;
    }

    .footer-text {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="noise"></div>

  <header>
    <span class="logo">Facecheck</span>
    <span class="tagline">AI Face Rating</span>
  </header>

  <main class="center" id="main">
    <h1>Rate<br /><em>your</em><br />face.</h1>
    <p class="sub">Point. Shoot. Judge.</p>

    <div style="display:flex;flex-direction:column;align-items:center;gap:0.5rem;">
      <button class="camera-btn" id="openCameraBtn" aria-label="Open camera">
        <div class="pulse-ring"></div>
        <svg viewBox="0 0 24 24">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </button>
      <span class="btn-label">Open camera</span>
    </div>

    <p class="error-msg" id="errorMsg">Camera access denied. Please allow camera permissions.</p>
  </main>

  <div class="video-wrapper" id="videoWrapper">
    <video id="videoFeed" autoplay playsinline></video>
    <button class="close-btn" id="closeCameraBtn">✕ close camera</button>
  </div>

  <footer>
    <span class="footer-text">Your video never leaves your device</span>
  </footer>

  <script>
    const openBtn = document.getElementById('openCameraBtn');
    const closeBtn = document.getElementById('closeCameraBtn');
    const main = document.getElementById('main');
    const videoWrapper = document.getElementById('videoWrapper');
    const video = document.getElementById('videoFeed');
    const errorMsg = document.getElementById('errorMsg');
    let stream = null;

    openBtn.addEventListener('click', async () => {
      errorMsg.style.display = 'none';
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
        video.srcObject = stream;
        main.style.display = 'none';
        videoWrapper.classList.add('active');
      } catch (err) {
        errorMsg.style.display = 'block';
      }
    });

    closeBtn.addEventListener('click', () => {
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      video.srcObject = null;
      videoWrapper.classList.remove('active');
      main.style.display = 'flex';
    });
  </script>
</body>
</html>
